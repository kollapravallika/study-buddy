<!DOCTYPE html>
<html>
<head>
<title>Feedback | StudyBuddy</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f2f4f7;
}

/* NAVBAR */
nav{
  background:#0b4fa3;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
}

nav a{
  color:white;
  margin-left:18px;
  text-decoration:none;
  padding:6px 10px;
  border-radius:4px;
}

.active{
  background:white;
  color:#0b4fa3;
  font-weight:bold;
}

/* FEEDBACK BOX */
.feedback-box{
  background:white;
  width:50%;
  margin:50px auto;
  padding:40px;
  border-radius:8px;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.feedback-box h2{
  text-align:center;
  margin-bottom:20px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

button{
  background:#0b4fa3;
  color:white;
  padding:10px 25px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.success{
  color:green;
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>
<nav>
 <b>StudyBuddy</b>
 <div>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="courses.html">Courses</a>
  <a href="papers.html">Question Papers</a>
  <a href="syllabus.html">Syllabus</a>
  <a href="ai.html">AI Assistant</a>
  <a href="internships.html">Internships</a>
  <a href="jobs.html">Jobs</a>
  <a href="feedback.html">Feedback</a>
  <a href="contact.html">Contact</a>
 </div>
</nav>

<div class="feedback-box">
  <h2>Student Feedback</h2>

  <input type="text" id="name" placeholder="Your Name">
  <select id="rating">
    <option value="">Rate Us</option>
    <option>Excellent</option>
    <option>Very Good</option>
    <option>Good</option>
    <option>Average</option>
    <option>Poor</option>
  </select>
  <textarea id="message" rows="5" placeholder="Write your feedback..."></textarea>

  <button onclick="submitFeedback()">Submit Feedback</button>

  <div class="success" id="successMsg"></div>
</div>

<script>
function submitFeedback(){
  let name = document.getElementById("name").value;
  let rating = document.getElementById("rating").value;
  let message = document.getElementById("message").value;

  if(name === "" || rating === "" || message === ""){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("successMsg").innerText =
    "Thank you " + name + "! Your feedback has been submitted.";

  document.getElementById("name").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("message").value = "";
}
</script>

</body>
</html>
